services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-remit}
      POSTGRES_DB: ${POSTGRES_DB:-remit}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remit} -d ${POSTGRES_DB:-remit}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
